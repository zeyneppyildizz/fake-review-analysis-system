<!DOCTYPE html>
<html lang="tr" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Takibi | Radar AI</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="d-flex flex-column min-vh-100">
    
    <cyber-navbar></cyber-navbar>

    <main class="flex-grow-1">
        <div class="container py-5">
            
            <div class="text-center mb-5">
                <h1 class="display-4 hero-title">
                    <i class="fa-solid fa-satellite-dish text-neon fa-fade me-3"></i>Favorilerim
                </h1>
                <p class="text-secondary fs-5 mt-2">Takip edilen ve risk artışında bilgilendirileceğiniz ürünleriniz.</p>
            </div>
            
            <div class="row mb-5 justify-content-center" id="favorite-section">
                <div class="col-lg-10 col-12">
                    
                    <div class="glass-card p-0 overflow-hidden" style="border: 1px solid rgba(0, 243, 255, 0.2);"> 
                        
                        <div class="p-3" style="background: rgba(0, 243, 255, 0.05); border-bottom: 1px solid rgba(0, 243, 255, 0.1);">
                            <h5 class="m-0 text-neon fw-bold" style="letter-spacing: 1px;">
                                <i class="fa-solid fa-list-check me-2"></i> AKTİF FAVORİ LİSTESİ
                            </h5>
                        </div>

                        <div class="table-responsive p-3">
                            <table class="table table-dark table-hover align-middle m-0 custom-table" style="background: transparent;">
                                <thead>
                                    <tr style="border-bottom: 2px solid rgba(0, 243, 255, 0.3); color: #00f3ff; font-size: 0.9rem; text-transform: uppercase;">
                                        <th>Ekleme Tarihi</th>
                                        <th>Hedef Ürün URL</th>
                                        <th>Sistem Durumu</th>
                                        <th>Son Risk Skoru</th>
                                        <th class="text-center">İşlemler</th>
                                    </tr>
                                </thead>
                                <tbody id="favoriteTableBody">
                                    <tr>
                                        <td colspan="5" class="text-center text-muted py-5">
                                            <i class="fa-solid fa-spinner fa-spin fa-2x mb-3 text-neon"></i><br>
                                            Veriler sunucudan çekiliyor... Lütfen bekleyin.
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm"> 
            <div class="modal-content text-center p-3" style="background: rgba(15, 23, 42, 0.95); border: 1px solid #ef4444; border-radius: 12px; backdrop-filter: blur(10px);">
                
                <div class="mb-3 mt-2">
                    <h6 class="text-light fw-bold m-0">Favorilerden Çıkar?</h6>
                </div>
                
                <p class="text-secondary mb-4" style="font-size: 0.85rem;">
                    Bu ürün favorilerden çıkarılacak.
                </p>
                
                <div class="d-flex justify-content-center gap-2">
                    <button type="button" class="btn btn-sm btn-outline-secondary w-50" data-bs-dismiss="modal">
                        İptal
                    </button>
                    <button type="button" class="btn btn-sm btn-danger w-50 fw-bold" id="btnConfirmDelete">
                        Kaldır
                    </button>
                </div>

            </div>
        </div>
    </div>

    <cyber-footer></cyber-footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="components.js"></script>
    <script src="script.js"></script>
</body>   
</html>
