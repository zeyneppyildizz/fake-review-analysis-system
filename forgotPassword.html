<!DOCTYPE html>
<html lang="tr" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şifremi Unuttum - Radar AI</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="d-flex flex-column min-vh-100">
    <div class="container py-5 flex-grow-1">
        <div class="row justify-content-center mt-5">
            <div class="col-lg-5 col-md-7">
                <!-- Düz ve gölgesiz modern kart tasarımı -->
                <div class="glass-card p-4 p-md-5" style="border: 1px solid var(--border-subtle);">
                    
                    <h4 class="text-center mb-4 text-white fw-bold">
                        Şifre Kurtarma
                    </h4>
                    
                    <div id="forgotStep1">
                        <!-- Soluk gri yerine beyaz metin -->
                        <p class="text-white text-center mb-4" style="font-size: 0.95rem;">
                            Sisteme kayıtlı e-posta adresinizi girin. Size bir doğrulama kodu göndereceğiz.
                        </p>
                        <!-- Neon alt çizgi yerine standart kutulu form elemanı -->
                        <input type="email" id="forgotEmail" class="form-control search-box mb-4" placeholder="E-posta adresiniz...">
                        
                        <button id="btnSendResetCode" class="btn btn-neon w-100 fw-bold mt-2 py-2">KOD GÖNDER</button>
                    </div>

                    <div id="forgotStep2" style="display: none;">
                        <p class="text-success text-center fw-bold mb-4" style="font-size: 0.95rem;">
                            <i class="fa-solid fa-check-circle me-1"></i> Kod e-postanıza gönderildi!
                        </p>
                        <input type="text" id="forgotCode" class="form-control search-box mb-3 text-center fw-bold text-white" style="letter-spacing: 5px; font-size: 1.2rem;" placeholder="000000" maxlength="6">
                        <input type="password" id="forgotNewPass" class="form-control search-box mb-4" placeholder="Yeni Şifreniz...">
                        
                        <button id="btnUpdatePass" class="btn btn-neon w-100 fw-bold py-2">ŞİFREYİ YENİLE</button>
                    </div>
                    
                    <div class="text-center mt-4 border-top pt-3" style="border-color: var(--border-subtle) !important;">
                        <!-- Neon link rengi yerine tok kurumsal mavi renk -->
                        <a href="login.html" class="text-decoration-none fw-bold" style="color: var(--primary-color); font-size: 0.9rem; transition: 0.3s;">
                            <i class="fa-solid fa-arrow-left me-1"></i> Giriş sayfasına dön
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
