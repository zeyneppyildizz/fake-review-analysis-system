<!DOCTYPE html>
<html lang="tr" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sisteme Giriş | Radar AI</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body class="d-flex flex-column min-vh-100">
    
    <div class="container py-5 flex-grow-1">
        <div class="row justify-content-center mt-5">
            <div class="col-md-5">
                <div class="glass-card p-5" style="border: 1px solid var(--border-subtle);">
                    
                    <div class="text-center mb-4" id="headerStep1">
                        <h2 class="hero-title text-white">SİSTEME GİRİŞ</h2>
                        <p class="text-white small" style="letter-spacing: 1px;">Kullanıcı Kimlik Doğrulaması</p>
                    </div>

                    <div class="text-center mb-4" id="headerStep2" style="display: none;">
                        <h2 class="hero-title" style="color: var(--primary-color);">GÜVENLİK ONAYI</h2>
                        <p class="text-white small" style="letter-spacing: 1px;">2FA / E-Posta Onayı Bekleniyor</p>
                    </div>
                    
                    <form id="loginForm">
                        
                        <div id="credentialsStep">
                            <div class="mb-3">
                                <label class="text-white small mb-1">Kullanıcı Adı</label>
                                <input type="text" class="form-control search-box" required id="loginUser">
                            </div>
                            <div class="mb-4">
                                <label class="text-white small mb-1">Şifre</label>
                                <div class="position-relative">
                                    <input type="password" class="form-control search-box pe-5" required id="loginPass">
                                </div>
                            </div>
                            <div class="text-end mt-2" style="margin-bottom: 10px;">
                                <a href="forgotPassword.html" class="text-decoration-none small" style="color: var(--primary-color);">
                                     Şifremi Unuttum
                                </a>
                            </div>
                            <div class="cf-turnstile mb-3 text-center" data-sitekey="0x4AAAAAADOS7-i8I5Gul7Az"></div> 
                            <button type="button" id="btnLoginStep1" class="btn btn-neon w-100 py-2 mb-3">Giriş Yap</button>
                        </div>
                        
                        <div id="codeStep" style="display: none;" class="mt-2 pt-3 border-top border-secondary">
                            <div class="text-center mb-3">
                                <i class="fa-solid fa-envelope-circle-check fs-3 mb-2" style="color: var(--primary-color);"></i>
                                <p id="otpMessage" class="text-white small m-0"></p>
                            </div>
                            <div class="mb-3">
                                <label class="small mb-1" style="color: var(--primary-color); letter-spacing: 1px; font-weight: 600;">6 HANELİ ONAY KODU</label>
                                <input type="text" id="authCode" class="form-control search-box text-center fs-3 fw-bold text-white" placeholder="000000" maxlength="6" style="letter-spacing: 10px;">
                            </div>
                            <button type="button" id="btnVerifyStep2" class="btn btn-neon w-100 py-2 mb-3 fw-bold">Doğrula ve Sisteme Gir</button>
                        </div>
                        
                        <div id="loginError" class="mt-3 text-center fw-bold" style="display: none; padding: 10px; border-radius: 5px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444;">
                            <i class="fa-solid fa-triangle-exclamation me-1"></i> <span id="errorText"></span>
                        </div>   
                        
                        <div class="text-center mt-4 border-top pt-3" style="border-color: var(--border-subtle) !important;">
                            <span class="text-white small">Sisteme kayıtlı değil misin?</span>
                            <a href="register.html" class="text-decoration-none small fw-bold" style="color: var(--primary-color);"> Kayıt Ol</a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
