<!DOCTYPE html>
<html lang="tr" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geçmiş | Radar AI</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <cyber-navbar></cyber-navbar>

    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="display-4 hero-title">Geçmiş Analizler</h1>
            <p class="text-secondary fs-5 mt-2">Geçmiş analizlerinizi burada görebilirsiniz.</p>
        </div>
        
        <div class="row mb-5" id="history-section">
            <div class="col-12">
                <div class="terminal-panel">                    
                    <div class="table-responsive p-3">
                        <table class="table table-dark table-hover align-middle m-0" style="background: transparent;">
                            <thead>
                                <tr style="border-bottom: 2px solid rgba(0, 243, 255, 0.3); color: #00f3ff;">
                                    <th>Tarih</th>
                                    <th>Hedef Ürün URL</th>
                                    <th>İncelenen Yorum</th>
                                    <th>Risk Durumu</th>
                                    <th class="text-center">İşlemler</th>
                                </tr>
                            </thead>
                            <tbody id="historyTableBody">
                                <tr>
                                    <td colspan="5" class="text-center text-muted py-4">
                                        <i class="fa-solid fa-spinner fa-spin me-2"></i> Geçmiş veriler yükleniyor...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <cyber-footer></cyber-footer>

    <script src="components.js"></script>
    <script src="script.js"></script>
</body>
</html>
