<!DOCTYPE html>
<html lang="tr" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeni Kayıt | Radar AI</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center mt-3">
            <div class="col-md-5">
                <div class="glass-card p-5">
                    
                    <div class="text-center mb-4" id="regHeaderStep1">
                        <h2 class="hero-title">SİSTEME KAYIT</h2>
                        <p class="text-muted small" style="letter-spacing: 1px;">Yeni Kullanıcı Oluştur</p>
                    </div>
                    <div class="text-center mb-4" id="regHeaderStep2" style="display: none;">
                        <i class="fa-solid fa-envelope-circle-check stat-icon text-info" style="font-size: 2.5rem; margin-bottom: 10px;"></i>
                        <h2 class="hero-title" style="color: #00f0ff;">E-POSTA ONAYI</h2>
                        <p class="text-muted small" style="letter-spacing: 1px;">Hesabınızı Aktifleştirin</p>
                    </div>

                    <form id="registerForm" onsubmit="event.preventDefault();">
                        
                        <div id="regInfoStep">
                            <div class="mb-3">
                                <label class="text-secondary small mb-1">Kullanıcı Adı</label>
                                <input type="text" class="form-control search-box" required id="regUser">
                            </div>
                            <div class="mb-3">
                                <label class="text-secondary small mb-1">E-Posta</label>
                                <input type="email" class="form-control search-box" required id="regEmail">
                            </div>
                            <div class="mb-3">
                                <label class="text-secondary small mb-1">Telefon</label>
                                <input type="tel" class="form-control search-box" required id="regPhone">
                            </div>
                            <div class="mb-3">
                                <label class="text-secondary small mb-1">Şifre</label>
                                <input type="password" class="form-control search-box" required id="regPass">
                            </div>
                            <div class="mb-4">
                                <label class="text-secondary small mb-1">Şifre (Tekrar)</label>
                                <input type="password" class="form-control search-box" required id="regPassConfirm">
                            </div>
                            
                            <div class="cf-turnstile mb-3 text-center" data-sitekey="0x4AAAAAADOS7-i8I5Gul7Az"></div> 
                            <button type="button" id="btnRegisterStep1" class="btn btn-neon w-100 py-2 mb-3">Hesap Oluştur</button>
                        </div>

                        <div id="regCodeStep" style="display: none;" class="mt-2 pt-3 border-top border-secondary">
                            <div class="text-center mb-3">
                                <p id="regOtpMessage" class="text-muted small m-0"></p>
                            </div>
                            <div class="mb-3">
                                <label class="text-warning small mb-1" style="letter-spacing: 1px;">6 HANELİ ONAY KODU</label>
                                <input type="text" id="regAuthCode" class="form-control search-box text-center fs-3 fw-bold" placeholder="000000" maxlength="6" style="letter-spacing: 10px;">
                            </div>
                            <button type="button" id="btnRegisterStep2" class="btn btn-success w-100 py-2 mb-3 fw-bold">Kaydı Tamamla</button>
                        </div>

                        <div id="regMessage" class="mt-3 text-center" style="display: none; padding: 10px; border-radius: 5px;">
                            <span id="regMsgText"></span>
                        </div>

                        <div class="text-center mt-3">
                            <span class="text-muted small">Zaten hesabın var mı?</span>
                            <a href="login.html" class="text-info text-decoration-none small fw-bold"> Giriş Yap</a>
                        </div>

                    </form>

                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
